<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Primary Meta Tags -->
    <title>Terms and Conditions - Service Agreement | PDF.web.id</title>
    <meta
      name="description"
      content="PDF.web.id terms of service. Free, client-side PDF tools with no file uploads. Read our terms and conditions."
    />
    <meta name="author" content="PDF.web.id" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://www.pdf.web.id/terms" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.pdf.web.id/terms" />
    <meta
      property="og:title"
      content="Terms and Conditions - Service Agreement | PDF.web.id"
    />
    <meta
      property="og:description"
      content="PDF.web.id terms of service. Free, client-side PDF tools with no file uploads. Read our terms and conditions."
    />
    <meta
      property="og:image"
      content="https://www.pdf.web.id/images/og-terms.png"
    />
    <meta property="og:site_name" content="PDF.web.id" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Terms and Conditions - Service Agreement | PDF.web.id"
    />
    <meta
      name="twitter:description"
      content="PDF.web.id terms of service. Free, client-side PDF tools with no file uploads. Read our terms and conditions."
    />
    <meta
      name="twitter:image"
      content="https://www.pdf.web.id/images/twitter-terms.png"
    />
    <meta name="twitter:site" content="@PDF.web.id" />

    <link href="/src/css/styles.css" rel="stylesheet" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/images/favicon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="/images/favicon-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/apple-touch-icon.png"
    />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
  </head>

  <body class="antialiased bg-gray-900 text-gray-300">
    {{> navbar }}
    <div id="app" class="container mx-auto p-4 md:p-8">
      <section class="max-w-4xl mx-auto py-12">
        <h1 class="text-4xl md:text-5xl font-bold text-center text-white mb-4">
          Terms and Conditions
        </h1>
        <p class="text-center text-gray-500">
          Last Updated: September 14, 2025
        </p>

        <div class="legal-content mt-12">
          
        </div>
      </section>
    </div>

    {{> footer }}
    <script type="module" src="src/js/utils/lucide-init.ts"></script>
    <script type="module" src="src/js/mobileMenu.ts"></script>
    <script type="module" src="src/js/main.ts"></script>
    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "TermsPage",
        "name": "Terms and Conditions - Service Agreement | PDF.web.id",
        "url": "https://www.pdf.web.id/terms"
      }
    </script>
  
    
</body>
</html>
